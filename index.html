<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Conferência de Expedição J&T</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-body: #f4f7f9;
            --bg-surface: #ffffff;
            --primary: #0056b3;
            --primary-hover: #004494;
            --secondary: #64748b;
            --secondary-hover: #475569;
            
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --success: #10b981;
            
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
            
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 24px; }
        h1, h2 { font-weight: 600; color: var(--text-main); }
        .container { max-width: 1400px; margin: 0 auto 24px; }

        .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
        .page-header i { font-size: 32px; color: var(--primary); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: var(--radius-md);
            font-size: 14px; font-weight: 500; background: var(--bg-surface); border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm); width: 100%; transition: var(--transition);
        }

        /* UPLOADS */
        .controls-section { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-md); margin-bottom: 24px; }
        .upload-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .file-dropzone {
            position: relative; border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 20px;
            text-align: center; background-color: var(--bg-body); transition: var(--transition); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .file-dropzone:hover { border-color: var(--primary); background-color: #f0f7ff; }
        .file-dropzone i { font-size: 28px; color: var(--secondary); transition: var(--transition); }
        .file-dropzone:hover i { color: var(--primary); }
        .file-dropzone input[type="file"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .dropzone-title { font-size: 14px; font-weight: 600; }
        .dropzone-filename { font-size: 12px; color: var(--text-muted); }

        /* BOTOES */
        .actions-bar { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: var(--radius-md); border: none; cursor: pointer; transition: var(--transition); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 2px 4px rgba(0, 86, 179, 0.2); }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background-color: var(--bg-body); border: 1px solid var(--border-color); }
        .btn-action { padding: 6px 12px; font-size: 12px; background-color: var(--secondary); color: white; }
        .btn-action:hover { background-color: var(--secondary-hover); }

        /* CARDS RESUMO */
        .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 32px; align-items: center; }
        .stat-card {
            background: var(--bg-surface); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; min-height: 110px;
        }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: var(--border-color); }
        .stat-card.primary::before { background-color: var(--primary); }
        .stat-card.warning::before { background-color: var(--warning); }
        .stat-card.success::before { background-color: var(--success); }
        
        .stat-header { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--text-main); line-height: 1; }

        /* 🚨 ALERTA MÁXIMO: EXPEDIDO NÃO CHEGOU 🚨 */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        @keyframes blink-text {
            0%, 100% { color: var(--danger-dark); }
            50% { color: #ff8a8a; }
        }

        .stat-card.critical {
            border: 2px solid var(--danger);
            background-color: var(--danger-light);
            transform: scale(1.08); /* Fica maior que os outros */
            box-shadow: var(--shadow-lg);
            z-index: 10;
        }
        .stat-card.critical::before { background-color: var(--danger); width: 6px; }
        .stat-card.critical .stat-header { color: var(--danger-dark); font-size: 14px; font-weight: 700; }
        .stat-card.critical .stat-value { font-size: 42px; } /* Número gigante */

        /* Classe ativada via JS apenas se houver faltantes */
        .stat-card.critical.active-alert {
            animation: pulse-red 2s infinite;
        }
        .stat-card.critical.active-alert .stat-value {
            animation: blink-text 1.5s infinite;
        }

        /* TABELAS */
        .table-grid { display: grid; gap: 24px; }
        .table-section { background: var(--bg-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .table-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border-color); background-color: #fafafa; }
        .table-header h2 { font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        /* Tabela de Faltantes Destacada */
        .table-section.critical-table { border: 2px solid var(--danger); }
        .table-section.critical-table .table-header { background-color: var(--danger); color: white; }
        .table-section.critical-table .table-header h2 { color: white; }
        .table-section.critical-table .btn-action { background-color: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); }
        .table-section.critical-table .btn-action:hover { background-color: white; color: var(--danger); }

        .table-container { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { position: sticky; top: 0; background-color: var(--bg-surface); padding: 12px 24px; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border-color); z-index: 10; }
        td { padding: 12px 24px; font-size: 14px; border-bottom: 1px solid var(--border-color); font-family: monospace; }
        tbody tr:hover { background-color: var(--bg-body); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s forwards; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        /* Responsividade para manter os cards legíveis em telas menores */
        @media (max-width: 1200px) {
            .summary-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            .stat-card.critical { transform: scale(1.02); } /* Menos zoom no mobile */
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="page-header">
            <i class="ph-fill ph-truck"></i>
            <h1>Conferência de Expedição J&T</h1>
        </header>

        <div class="controls-section fade-in">
            <div class="upload-grid">
                <label class="file-dropzone" for="fileInput1">
                    <i class="ph ph-file-xls"></i>
                    <span class="dropzone-title">1. Expedidos DC</span>
                    <span class="dropzone-filename" id="fileName1">Aguardando arquivo</span>
                    <input type="file" id="fileInput1" accept=".xlsx, .xls">
                </label>
                <label class="file-dropzone" for="fileInput2">
                    <i class="ph ph-barcode"></i>
                    <span class="dropzone-title">2. Recebido na Base</span>
                    <span class="dropzone-filename" id="fileName2">Aguardando arquivo</span>
                    <input type="file" id="fileInput2" accept=".xlsx, .xls">
                </label>
                <label class="file-dropzone" for="fileInput3">
                    <i class="ph ph-steering-wheel"></i>
                    <span class="dropzone-title">3. Bipagem Motorista</span>
                    <span class="dropzone-filename" id="fileName3">Aguardando arquivo (Opcional)</span>
                    <input type="file" id="fileInput3" accept=".xlsx, .xls">
                </label>
            </div>

            <div class="status-badge" id="statusMessage">
                <i class="ph ph-info"></i> Insira os relatórios para iniciar o cruzamento de dados.
            </div>

            <div class="actions-bar">
                <button id="clearButton" class="btn btn-secondary"><i class="ph ph-arrows-clockwise"></i> Nova Conferência</button>
                <button id="compareButton" class="btn btn-primary"><i class="ph-fill ph-play-circle" id="btnIcon"></i> Gerar Relatório</button>
            </div>
        </div>

        <div id="overallSummaryContainer" class="summary-grid">
            </div>

        <div class="table-grid">
            
            <div class="table-section critical-table fade-in" id="missingSection" style="display: none;">
                <div class="table-header">
                    <h2>🚨 ATENÇÃO: Expedido Não Chegou (Faltantes)</h2>
                    <button id="copyButtonMissing" class="btn btn-action">
                        <i class="ph ph-copy"></i> Copiar Lista
                    </button>
                </div>
                <div class="table-container">
                    <table id="missingTable">
                        <thead><tr><th>Nº Remessa Desaparecida</th></tr></thead>
                        <tbody id="tableBodyMissing"></tbody>
                    </table>
                </div>
            </div>

            <div class="table-section fade-in" id="driverSection" style="display: none; animation-delay: 0.1s;">
                <div class="table-header">
                    <h2 style="color: var(--warning);"><i class="ph-fill ph-warning-circle"></i> Direto para Motorista</h2>
                    <button id="copyButtonDriver" class="btn btn-action"><i class="ph ph-copy"></i> Copiar</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Nº Remessa</th><th>Status</th></tr></thead>
                        <tbody id="tableBodyDriver"></tbody>
                    </table>
                </div>
            </div>

            <div class="table-section fade-in" id="unexpectedSection" style="display: none; animation-delay: 0.2s;">
                <div class="table-header">
                    <h2 style="color: var(--success);"><i class="ph-fill ph-plus-circle"></i> Recebidos sem Expedição (Sobras)</h2>
                    <button id="copyButtonUnexpected" class="btn btn-action"><i class="ph ph-copy"></i> Copiar</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Nº Remessa Sobrando</th></tr></thead>
                        <tbody id="tableBodyUnexpected"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // Nomes dos arquivos no upload
            ['1', '2', '3'].forEach(id => {
                document.getElementById('fileInput' + id).addEventListener('change', (e) => {
                    const label = document.getElementById('fileName' + id);
                    if (e.target.files.length > 0) {
                        label.textContent = e.target.files[0].name;
                        label.style.color = 'var(--primary)';
                        label.style.fontWeight = '700';
                    }
                });
            });

            // Lógica
            let missingItemsList = [];
            let directToDriverList = [];
            let unexpectedItemsList = [];

            const compareButton = document.getElementById('compareButton');
            const clearButton = document.getElementById('clearButton');
            const statusMessage = document.getElementById('statusMessage');

            compareButton.addEventListener('click', handleCompare);
            clearButton.addEventListener('click', () => location.reload());
            
            document.getElementById('copyButtonMissing').addEventListener('click', function() { handleCopy(missingItemsList, this); });
            document.getElementById('copyButtonDriver').addEventListener('click', function() { handleCopy(directToDriverList.map(i=>i.remessa), this); });
            document.getElementById('copyButtonUnexpected').addEventListener('click', function() { handleCopy(unexpectedItemsList, this); });

            function handleCompare() {
                const f1 = document.getElementById('fileInput1').files[0];
                const f2 = document.getElementById('fileInput2').files[0];
                const f3 = document.getElementById('fileInput3').files[0];

                if (!f1 || !f2) {
                    statusMessage.innerHTML = `<i class="ph-fill ph-warning"></i> ERRO: Arquivos 1 e 2 são obrigatórios.`;
                    statusMessage.style.borderColor = 'var(--danger)';
                    statusMessage.style.backgroundColor = 'var(--danger-light)';
                    statusMessage.style.color = 'var(--danger)';
                    return;
                }

                statusMessage.innerHTML = `<i class="ph ph-spinner spin"></i> Cruzando dados, aguarde...`;
                statusMessage.style.borderColor = 'var(--primary)';
                statusMessage.style.backgroundColor = '#f0f7ff';
                statusMessage.style.color = 'var(--primary)';
                compareButton.disabled = true;

                Promise.all([readExcelFile(f1), readExcelFile(f2), f3 ? readExcelFile(f3) : Promise.resolve([])])
                .then(([r1, r2, r3]) => {
                    processData(r1, r2, r3);
                    statusMessage.innerHTML = `<i class="ph-fill ph-check-circle"></i> Análise concluída com sucesso!`;
                    statusMessage.style.borderColor = 'var(--success)';
                    statusMessage.style.backgroundColor = '#ecfdf5';
                    statusMessage.style.color = 'var(--success)';
                })
                .catch(() => {
                    statusMessage.innerHTML = `<i class="ph-fill ph-warning"></i> Erro ao processar as planilhas.`;
                })
                .finally(() => compareButton.disabled = false);
            }

            function processData(rows1, rows2, rows3) {
                const set1 = new Set(); rows1.forEach(r => { const val = filterRemessa(r[0]); if(val) set1.add(val); });
                const set2 = new Set(); rows2.forEach(r => { const val = filterRemessa(r[0]); if(val) set2.add(val); });
                const set3 = new Set(); rows3.forEach(r => { const val = filterRemessa(r[0]); if(val) set3.add(val); });

                missingItemsList = []; directToDriverList = []; unexpectedItemsList = [];

                set1.forEach(remessa => {
                    if (!set2.has(remessa) && !set3.has(remessa)) missingItemsList.push(remessa);
                    else if (!set2.has(remessa) && set3.has(remessa)) directToDriverList.push({ remessa });
                });

                set2.forEach(remessa => { if (!set1.has(remessa)) unexpectedItemsList.push(remessa); });

                renderSummaryCards(set1.size, set2.size, directToDriverList.length, missingItemsList.length, unexpectedItemsList.length);
                renderTables();
            }

            function filterRemessa(val) {
                if (!val) return null;
                val = String(val).trim().toUpperCase();
                if (val.startsWith('BR')) return null;
                if (val.length >= 15) val = val.substring(0, 15);
                if (!/^\d{15}$/.test(val)) return null;
                return val;
            }

            function readExcelFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(XLSX.utils.sheet_to_json(XLSX.read(e.target.result, { type: 'binary' }).Sheets[XLSX.read(e.target.result, { type: 'binary' }).SheetNames[0]], { header: 1, defval: "" }));
                    reader.onerror = reject;
                    reader.readAsBinaryString(file);
                });
            }

            function renderSummaryCards(monit, base, driv, miss, unexp) {
                const hasMissing = miss > 0;
                
                // Se tiver faltante, ativa a classe que faz pulsar. Se não, fica como "success" (verde).
                const missingCardClass = hasMissing ? "critical active-alert" : "critical"; 
                const missingIcon = hasMissing ? "🚨" : "<i class='ph-fill ph-check-circle' style='color: var(--success);'></i>";
                const missingColor = hasMissing ? "" : "color: var(--success);";
                const missingText = hasMissing ? "FALTANTES IDENTIFICADOS" : "TUDO CERTO (ZERO FALTAS)";

                document.getElementById('overallSummaryContainer').innerHTML = `
                    <div class="stat-card primary fade-in"><div class="stat-header"><i class="ph-bold ph-package"></i> Expedidos DC</div><div class="stat-value">${monit}</div></div>
                    <div class="stat-card fade-in"><div class="stat-header"><i class="ph-bold ph-barcode"></i> Recebido Base</div><div class="stat-value">${base}</div></div>
                    
                    <div class="stat-card ${missingCardClass} fade-in">
                        <div class="stat-header" style="${missingColor}">${missingIcon} ${missingText}</div>
                        <div class="stat-value" style="${missingColor}">${miss}</div>
                    </div>

                    <div class="stat-card warning fade-in"><div class="stat-header"><i class="ph-bold ph-steering-wheel"></i> Direto Motorista</div><div class="stat-value">${driv}</div></div>
                    <div class="stat-card success fade-in"><div class="stat-header"><i class="ph-bold ph-plus-circle"></i> Sem Bipe do DC</div><div class="stat-value">${unexp}</div></div>
                `;
            }

            function renderTables() {
                const secMissing = document.getElementById('missingSection');
                const tbMissing = document.getElementById('tableBodyMissing');
                secMissing.style.display = 'flex';
                
                if (missingItemsList.length === 0) {
                    secMissing.classList.remove('critical-table'); // Remove o vermelho da tabela se não tiver falta
                    tbMissing.innerHTML = `<tr><td><div class="empty-state"><i class="ph-fill ph-check-circle" style="color: var(--success); font-size: 40px;"></i> <strong>Operação Redonda!</strong> Nenhum pacote expedido ficou para trás.</div></td></tr>`;
                } else {
                    secMissing.classList.add('critical-table'); // Pinta o header da tabela de vermelho
                    tbMissing.innerHTML = missingItemsList.map(i => `<tr><td style="color: var(--danger-dark); font-weight: 700; font-size: 16px;">${i}</td></tr>`).join('');
                }

                // Renderiza as outras (Direto Motorista e Sobras)
                document.getElementById('driverSection').style.display = 'flex';
                document.getElementById('tableBodyDriver').innerHTML = directToDriverList.length === 0 ? `<tr><td colspan="2"><div class="empty-state">Nenhum pacote pulou a base.</div></td></tr>` : directToDriverList.map(i => `<tr><td><strong>${i.remessa}</strong></td><td><span style="color: var(--warning); font-weight: 600;">Identificado no Motorista</span></td></tr>`).join('');

                document.getElementById('unexpectedSection').style.display = 'flex';
                document.getElementById('tableBodyUnexpected').innerHTML = unexpectedItemsList.length === 0 ? `<tr><td><div class="empty-state">Nenhuma sobra registrada.</div></td></tr>` : unexpectedItemsList.map(i => `<tr><td style="color: var(--success); font-weight: 600;">${i}</td></tr>`).join('');
            }

            function handleCopy(list, btn) {
                if (!list.length) return;
                navigator.clipboard.writeText(list.join('\n')).then(() => {
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `<i class="ph-bold ph-check"></i> Copiado!`;
                    setTimeout(() => btn.innerHTML = originalHtml, 2000);
                });
            }
        });
    </script>
</body>
</html>
